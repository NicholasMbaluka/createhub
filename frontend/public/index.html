<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CreateHub — Creator Economy Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet"/>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://cdn.lemonsqueezy.com/lemon.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --syne: 'Syne', sans-serif;
    --dm: 'DM Sans', sans-serif;
    --bg: #08080e;
    --bg2: #0f0f18;
    --bg3: #17172280;
    --bg3s: #171722;
    --bg4: #1e1e2e;
    --border: #22223388;
    --border2: #32324a;
    --text: #ededf8;
    --text2: #8888aa;
    --text3: #44445a;
    --accent: #7c6ff7;
    --accent2: #5b4fe0;
    --accent3: #a89dff;
    --accentbg: #1a1730;
    --green: #22d48e;
    --greenbg: #0a2018;
    --red: #f04444;
    --redbg: #200a0a;
    --amber: #f5a623;
    --amberbg: #201408;
    --blue: #4a9eff;
    --bluebg: #0a1828;
    --pink: #e056a0;
    --teal: #1db8a0;
    --radius: 10px;
    --radius-lg: 14px;
    --radius-xl: 18px;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--dm);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ─── APP SHELL ─── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ─── TOPNAV ─── */
  .nav {
    display: flex; align-items: center; padding: 0 2rem; height: 58px;
    border-bottom: 1px solid var(--border); background: var(--bg);
    position: sticky; top: 0; z-index: 200; gap: 0.75rem;
    backdrop-filter: blur(12px);
  }
  .nav-logo {
    font-family: var(--syne); font-weight: 800; font-size: 20px;
    color: var(--text); letter-spacing: -0.5px; cursor: pointer;
    user-select: none; flex-shrink: 0;
  }
  .nav-logo span { color: var(--accent); }
  .nav-pill {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
    background: var(--accentbg); color: var(--accent3); border: 1px solid #2e2860;
    letter-spacing: 0.3px;
  }
  .nav-links { display: flex; gap: 0.4rem; margin-left: auto; align-items: center; }
  .nav-btn {
    font-family: var(--dm); font-size: 13px; padding: 7px 15px;
    border-radius: 8px; border: none; cursor: pointer; font-weight: 500;
    transition: all 0.15s; line-height: 1;
  }
  .nav-btn.ghost { background: transparent; color: var(--text2); }
  .nav-btn.ghost:hover { background: var(--bg4); color: var(--text); }
  .nav-btn.primary { background: var(--accent); color: #fff; }
  .nav-btn.primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .nav-btn.outline { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
  .nav-btn.outline:hover { background: var(--bg4); color: var(--text); }
  .nav-profile {
    display: flex; align-items: center; gap: 8px; padding: 5px 12px 5px 6px;
    background: var(--bg3s); border: 1px solid var(--border2); border-radius: 9px;
    cursor: pointer; transition: background 0.12s;
  }
  .nav-profile:hover { background: var(--bg4); }
  .notif-btn {
    position: relative; background: transparent; border: 1px solid var(--border2);
    border-radius: 8px; padding: 6px 10px; cursor: pointer; color: var(--text2);
    font-size: 15px; transition: all 0.12s;
  }
  .notif-btn:hover { background: var(--bg4); color: var(--text); }
  .notif-dot {
    position: absolute; top: 5px; right: 6px; width: 7px; height: 7px;
    background: var(--accent); border-radius: 50%; border: 1px solid var(--bg);
  }

  /* ─── LAYOUT ─── */
  .shell { display: flex; flex: 1; min-height: calc(100vh - 58px); }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 220px; min-width: 220px; background: var(--bg2);
    border-right: 1px solid var(--border); padding: 1rem 0;
    display: flex; flex-direction: column; position: sticky;
    top: 58px; height: calc(100vh - 58px); overflow-y: auto;
  }
  .sidebar-section {
    font-size: 10px; font-weight: 700; color: var(--text3);
    letter-spacing: 1.2px; text-transform: uppercase;
    padding: 0.9rem 1.25rem 0.3rem;
  }
  .s-item {
    display: flex; align-items: center; gap: 9px; padding: 9px 1.25rem;
    cursor: pointer; color: var(--text2); font-size: 13.5px;
    border-left: 2px solid transparent; transition: all 0.12s; user-select: none;
  }
  .s-item:hover { color: var(--text); background: var(--bg3s); }
  .s-item.active { color: var(--text); background: var(--bg3s); border-left-color: var(--accent); }
  .s-item .s-icon { width: 17px; text-align: center; font-size: 14px; flex-shrink: 0; }
  .s-badge {
    margin-left: auto; font-size: 10px; background: var(--accent);
    color: #fff; padding: 2px 7px; border-radius: 10px; font-weight: 700;
  }
  .sidebar-footer { margin-top: auto; padding: 1rem 1.25rem; }

  /* ─── MAIN CONTENT ─── */
  .main { flex: 1; overflow-y: auto; background: var(--bg); }
  .page { padding: 2rem; max-width: 1080px; animation: fadeUp 0.22s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── PAGE HEADER ─── */
  .ph { margin-bottom: 1.75rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .ph-left {}
  .ph-title { font-family: var(--syne); font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .ph-sub { color: var(--text2); font-size: 13.5px; margin-top: 3px; }

  /* ─── STAT CARDS ─── */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.2rem 1.25rem;
  }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 0.4rem; }
  .stat-val { font-family: var(--syne); font-size: 28px; font-weight: 800; letter-spacing: -1px; }
  .stat-change { font-size: 12px; margin-top: 4px; display: flex; align-items: center; gap: 3px; }
  .up { color: var(--green); }
  .dn { color: var(--red); }
  .neu { color: var(--text3); }

  /* ─── CARDS ─── */
  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem;
  }
  .card-title {
    font-size: 11px; font-weight: 700; color: var(--text3);
    letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 1rem;
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.25rem; }
  .mt-1 { margin-top: 0.5rem; }
  .mt-2 { margin-top: 1rem; }
  .mt-3 { margin-top: 1.5rem; }
  .mb-2 { margin-bottom: 1rem; }
  .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
  .w100 { width: 100%; }

  /* ─── BADGES ─── */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600; padding: 3px 9px;
    border-radius: 20px; letter-spacing: 0.2px; white-space: nowrap;
  }
  .b-green { background: var(--greenbg); color: var(--green); }
  .b-red { background: var(--redbg); color: var(--red); }
  .b-amber { background: var(--amberbg); color: var(--amber); }
  .b-blue { background: var(--bluebg); color: var(--blue); }
  .b-purple { background: var(--accentbg); color: var(--accent3); }
  .b-gray { background: var(--bg4); color: var(--text2); border: 1px solid var(--border2); }

  /* ─── AVATAR ─── */
  .avatar {
    border-radius: 50%; display: inline-flex; align-items: center;
    justify-content: center; font-weight: 700; color: #fff; flex-shrink: 0;
    font-size: 12px;
  }

  /* ─── INPUTS / FORM ─── */
  input, select, textarea {
    background: var(--bg3s); border: 1px solid var(--border2);
    border-radius: 8px; padding: 9px 13px; color: var(--text);
    font-family: var(--dm); font-size: 13.5px; outline: none;
    transition: border-color 0.15s; width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text3); }
  select option { background: var(--bg4); }
  label { font-size: 12.5px; color: var(--text2); font-weight: 500; margin-bottom: 5px; display: block; }
  .form-group { margin-bottom: 1.1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  textarea { resize: vertical; }

  /* ─── BUTTONS ─── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px; font-size: 13.5px;
    font-weight: 500; cursor: pointer; font-family: var(--dm);
    border: none; transition: all 0.15s; line-height: 1; white-space: nowrap;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
  .btn-outline:hover { background: var(--bg4); color: var(--text); }
  .btn-danger { background: var(--redbg); color: var(--red); border: 1px solid #3a1010; }
  .btn-danger:hover { background: #2a0a0a; }
  .btn-success { background: var(--greenbg); color: var(--green); border: 1px solid #123020; }
  .btn-success:hover { background: #0c2a1a; }
  .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 7px; }

  /* ─── TABLES ─── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th {
    text-align: left; font-size: 10.5px; color: var(--text3); font-weight: 700;
    letter-spacing: 0.7px; text-transform: uppercase; padding: 0 1rem 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.1s; }
  tbody tr:hover td { background: var(--bg3s); }
  .user-cell { display: flex; align-items: center; gap: 10px; }
  .u-name { font-weight: 500; color: var(--text); font-size: 13.5px; }
  .u-email { font-size: 12px; color: var(--text3); margin-top: 1px; }

  /* ─── PROGRESS BAR ─── */
  .pbar { height: 5px; background: var(--bg4); border-radius: 3px; overflow: hidden; margin-top: 5px; }
  .pfill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.3s; }

  /* ─── BAR CHART ─── */
  .bar-chart { display: flex; align-items: flex-end; gap: 4px; }
  .bar-chart .bar {
    flex: 1; border-radius: 3px 3px 0 0; opacity: 0.7;
    transition: opacity 0.1s; cursor: pointer;
  }
  .bar-chart .bar:hover { opacity: 1; }
  .chart-labels { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--text3); margin-top: 5px; }

  /* ─── TOAST ─── */
  #toast-area {
    position: fixed; bottom: 24px; right: 24px;
    z-index: 9999; display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: var(--bg4); border: 1px solid var(--border2); border-radius: 10px;
    padding: 11px 16px; color: var(--text); font-size: 13.5px;
    display: flex; align-items: center; gap: 10px;
    animation: toastIn 0.2s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-width: 300px; pointer-events: all;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(16px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes toastOut {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(16px); }
  }

  /* ─── MODAL ─── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    z-index: 500; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px); padding: 1rem;
  }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--radius-xl); padding: 2rem; width: 460px; max-width: 100%;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.94) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-title { font-family: var(--syne); font-size: 18px; font-weight: 700; margin-bottom: 1.5rem; }
  .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }

  /* ─── LANDING ─── */
  .hero {
    padding: 6rem 2rem 5rem; text-align: center;
    max-width: 860px; margin: 0 auto;
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--accentbg); border: 1px solid #2e2860;
    border-radius: 20px; padding: 5px 14px; font-size: 12px;
    color: var(--accent3); font-weight: 600; margin-bottom: 1.75rem;
    letter-spacing: 0.3px;
  }
  .hero-title {
    font-family: var(--syne); font-size: clamp(38px, 5.5vw, 64px);
    font-weight: 800; letter-spacing: -2.5px; line-height: 1.05;
    color: var(--text); margin-bottom: 1.25rem;
  }
  .hero-title .hl { color: var(--accent); }
  .hero-sub {
    font-size: 17px; color: var(--text2); max-width: 560px;
    margin: 0 auto 2.75rem; line-height: 1.75;
  }
  .hero-cta { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .hero-btn {
    padding: 13px 30px; border-radius: 10px; font-size: 15px; font-weight: 600;
    cursor: pointer; border: none; font-family: var(--dm); transition: all 0.15s;
  }
  .hero-btn.primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 28px rgba(124,111,247,0.4);
  }
  .hero-btn.primary:hover { background: var(--accent2); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,111,247,0.45); }
  .hero-btn.secondary { background: var(--bg4); color: var(--text); border: 1px solid var(--border2); }
  .hero-btn.secondary:hover { background: var(--bg3s); }

  /* Stats banner */
  .stats-banner {
    display: flex; justify-content: center; gap: 3rem;
    padding: 1.5rem 2rem 3rem; flex-wrap: wrap;
  }
  .stat-item { text-align: center; }
  .stat-num { font-family: var(--syne); font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -1px; }
  .stat-lbl { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* Features */
  .features-section { padding: 0 2rem 5rem; max-width: 1100px; margin: 0 auto; }
  .section-header { text-align: center; margin-bottom: 2.5rem; }
  .section-tag {
    display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--accent3); margin-bottom: 0.75rem;
  }
  .section-title { font-family: var(--syne); font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem; }
  .section-sub { color: var(--text2); font-size: 15px; }
  .features-grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 1.5rem; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
  .feature-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-xl); padding: 1.75rem;
    transition: border-color 0.2s, transform 0.2s;
  }
  .feature-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .f-icon { font-size: 26px; margin-bottom: 0.9rem; }
  .f-title { font-family: var(--syne); font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .f-desc { font-size: 13px; color: var(--text2); line-height: 1.65; }

  /* Pricing */
  .pricing-section { padding: 0 2rem 6rem; max-width: 960px; margin: 0 auto; }
  .pricing-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.25rem; }
  .plan-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-xl); padding: 1.75rem; position: relative;
    transition: border-color 0.2s;
  }
  .plan-card:hover { border-color: var(--border2); }
  .plan-card.featured { border-color: var(--accent); background: #0c0a1e; }
  .plan-card.current { border-color: var(--green); background: var(--greenbg); }
  .plan-pop {
    position: absolute; top: -13px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #fff; font-size: 10px; font-weight: 800;
    padding: 3px 12px; border-radius: 20px; letter-spacing: 0.5px; white-space: nowrap;
  }
  .plan-name { font-family: var(--syne); font-size: 15px; font-weight: 700; margin-bottom: 0.25rem; color: var(--text2); }
  .plan-price {
    font-family: var(--syne); font-size: 40px; font-weight: 800;
    color: var(--text); letter-spacing: -2px; margin-bottom: 1.5rem; line-height: 1;
  }
  .plan-price .per { font-size: 14px; color: var(--text3); font-weight: 400; letter-spacing: 0; }
  .plan-feat {
    font-size: 13px; color: var(--text2); padding: 6px 0;
    border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
  }
  .plan-feat:last-of-type { border-bottom: none; }
  .ck { color: var(--green); font-size: 12px; flex-shrink: 0; }
  .xx { color: var(--text3); font-size: 12px; flex-shrink: 0; }
  .plan-cta {
    width: 100%; margin-top: 1.5rem; padding: 11px; text-align: center;
    border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer;
    border: none; font-family: var(--dm); transition: all 0.15s;
  }
  .plan-cta.main { background: var(--accent); color: #fff; }
  .plan-cta.main:hover { background: var(--accent2); }
  .plan-cta.out { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
  .plan-cta.out:hover { background: var(--bg4); color: var(--text); }
  .plan-cta.current-plan-btn { background: var(--green); color: #fff; cursor: default; }
  .plan-card.current { border-color: var(--green); background: var(--greenbg); }

  /* Subscription Styles */
  .subscription-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1rem; border-bottom: 1px solid var(--border);
  }
  .subscription-item:last-child { border-bottom: none; }
  .subscription-name { font-weight: 600; color: var(--text); margin-bottom: 0.25rem; }
  .subscription-price { font-size: 14px; color: var(--text2); margin-bottom: 0.25rem; }
  .subscription-status {
    display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px;
    font-weight: 600; text-transform: uppercase;
  }
  .subscription-status.active { background: var(--greenbg); color: var(--green); }
  .subscription-status.cancelled { background: var(--redbg); color: var(--red); }

  /* Loading Styles */
  .loading-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(8, 8, 14, 0.9); display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .loading-content {
    text-align: center;
  }
  .loading-spinner {
    width: 40px; height: 40px; border: 3px solid var(--border2);
    border-top: 3px solid var(--accent); border-radius: 50%;
    animation: spin 1s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .loading-text { color: var(--text2); font-size: 14px; }

  /* Footer */
  .landing-footer {
    border-top: 1px solid var(--border); padding: 2rem;
    text-align: center; color: var(--text3); font-size: 13px;
  }
  .landing-footer span { color: var(--accent3); }

  /* ─── AUTH PAGE ─── */
  .auth-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 3rem 2rem; min-height: calc(100vh - 58px);
  }
  .auth-card { width: 420px; max-width: 100%; }
  .auth-logo { font-family: var(--syne); font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 4px; }
  .auth-logo span { color: var(--accent); }
  .auth-sub { color: var(--text2); text-align: center; margin-bottom: 2rem; font-size: 14px; }
  .auth-tabs {
    display: flex; background: var(--bg3s); border-radius: 10px; padding: 4px;
    margin-bottom: 1.5rem; gap: 4px; border: 1px solid var(--border);
  }
  .auth-tab {
    flex: 1; text-align: center; padding: 8px; border-radius: 7px;
    cursor: pointer; font-size: 13.5px; color: var(--text2); transition: all 0.15s;
    user-select: none;
  }
  .auth-tab.active { background: var(--bg4); color: var(--text); font-weight: 500; }
  .auth-divider { display: flex; align-items: center; gap: 1rem; margin: 1.25rem 0; color: var(--text3); font-size: 12px; }
  .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .role-select { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
  .role-option {
    padding: 1rem; border-radius: 10px; border: 1px solid var(--border2);
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .role-option:hover { border-color: var(--accent); background: var(--accentbg); }
  .role-option.sel { border-color: var(--accent); background: var(--accentbg); }
  .r-icon { font-size: 22px; margin-bottom: 5px; }
  .r-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .r-desc { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* ─── CREATOR PAGES ─── */
  /* Products */
  .product-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.15s;
  }
  .product-card:hover { border-color: var(--border2); }
  .prod-thumb {
    height: 115px; background: var(--bg3s); display: flex; align-items: center;
    justify-content: center; font-size: 36px; position: relative;
  }
  .prod-body { padding: 1rem; }
  .prod-name { font-weight: 600; color: var(--text); font-size: 14px; margin-bottom: 3px; }
  .prod-meta { font-size: 12px; color: var(--text3); display: flex; justify-content: space-between; align-items: center; }
  .prod-price { font-family: var(--syne); font-size: 18px; font-weight: 800; color: var(--green); }
  .prod-actions { display: flex; gap: 6px; margin-top: 0.75rem; }

  /* Link in Bio */
  .bio-preview {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-xl); padding: 2rem; text-align: center;
  }
  .bio-ring {
    width: 74px; height: 74px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    padding: 2.5px; margin: 0 auto 1rem;
  }
  .bio-inner {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--bg2); display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .bio-link {
    background: var(--bg3s); border: 1px solid var(--border2); border-radius: 10px;
    padding: 0.85rem 1.25rem; margin-bottom: 0.5rem; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    transition: background 0.12s; color: var(--text); font-size: 14px; font-weight: 500;
  }
  .bio-link:hover { background: var(--bg4); }

  /* KYC */
  .kyc-step {
    display: flex; gap: 1rem; padding: 1rem; background: var(--bg3s);
    border-radius: 10px; margin-bottom: 0.75rem;
    align-items: flex-start; border: 1px solid var(--border);
  }
  .kyc-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .kyc-num.done { background: var(--green); }
  .kyc-num.lock { background: var(--bg4); color: var(--text3); }
  .kyc-info h4 { font-size: 14px; font-weight: 600; color: var(--text); }
  .kyc-info p { font-size: 12.5px; color: var(--text3); margin-top: 2px; }

  /* Notifications */
  .notif-row {
    display: flex; gap: 12px; padding: 0.9rem 0;
    border-bottom: 1px solid var(--border); align-items: flex-start;
  }
  .notif-row:last-child { border-bottom: none; }
  .n-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .n-title { font-size: 13.5px; color: var(--text); font-weight: 500; }
  .n-time { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* Toggle switch */
  .toggle {
    width: 40px; height: 22px; border-radius: 11px;
    cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0;
    border: 1px solid var(--border2);
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle.off { background: var(--bg4); }
  .toggle-knob {
    width: 16px; height: 16px; background: #fff; border-radius: 50%;
    position: absolute; top: 2px; transition: left 0.2s;
  }
  .toggle.on .toggle-knob { left: 20px; }
  .toggle.off .toggle-knob { left: 2px; }

  /* Subscription row */
  .sub-row {
    display: flex; align-items: center; padding: 0.85rem 0;
    border-bottom: 1px solid var(--border); gap: 1rem;
  }
  .sub-row:last-child { border-bottom: none; }

  /* ─── PRICING CARDS ─── */
  .pricing-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5rem;
    margin: 2rem 0;
  }

  .pricing-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem;
    position: relative;
    transition: all 0.3s ease;
  }

  .pricing-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 32px rgba(124, 111, 247, 0.1);
  }

  .pricing-card.popular {
    border-color: var(--accent);
    transform: scale(1.02);
  }

  .pricing-card.current {
    border-color: var(--green);
    background: var(--greenbg);
  }

  .popular-badge {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: white;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .current-badge {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: white;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .plan-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .plan-header h3 {
    font-family: var(--syne);
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .plan-price {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 4px;
  }

  .price-amount {
    font-size: 36px;
    font-weight: 800;
    color: var(--text);
  }

  .price-period {
    font-size: 14px;
    color: var(--text2);
  }

  .plan-features {
    margin-bottom: 2rem;
  }

  .plan-features ul {
    list-style: none;
    padding: 0;
  }

  .plan-features li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    font-size: 14px;
    color: var(--text2);
  }

  .feature-icon {
    color: var(--green);
    font-weight: bold;
    flex-shrink: 0;
  }

  .plan-action {
    text-align: center;
  }

  .current-plan-btn {
    background: var(--green);
    color: white;
    cursor: default;
  }

  .current-plan-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .current-plan-info h3 {
    font-family: var(--syne);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .plan-status {
    font-size: 14px;
    margin-bottom: 0.5rem;
  }

  .plan-status.active {
    color: var(--green);
  }

  .plan-price {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  /* ─── FAQ ─── */
  .faq-section {
    margin-top: 3rem;
  }

  .faq-section h2 {
    font-family: var(--syne);
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 1.5rem;
    text-align: center;
    color: var(--text);
  }

  .faq-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .faq-question {
    width: 100%;
    background: transparent;
    border: none;
    padding: 1.25rem;
    text-align: left;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.2s ease;
  }

  .faq-question:hover {
    background: var(--bg3s);
  }

  .faq-toggle {
    font-size: 18px;
    color: var(--accent);
    transition: transform 0.2s ease;
  }

  .faq-answer {
    padding: 0 1.25rem 1.25rem;
    color: var(--text2);
    font-size: 14px;
    line-height: 1.6;
  }

  .page-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .page-title {
    font-family: var(--syne);
    font-size: 36px;
    font-weight: 800;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .page-subtitle {
    font-size: 16px;
    color: var(--text2);
  }

  /* ─── PAYMENT FORM ─── */
  .payment-modal {
    max-width: 500px;
  }

  .payment-form {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .card-element {
    background: var(--bg3s);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 1rem;
    color: var(--text);
  }

  .payment-error {
    background: var(--redbg);
    border: 1px solid var(--red);
    color: var(--red);
    padding: 0.75rem;
    border-radius: var(--radius);
    font-size: 14px;
  }

  .payment-processing {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--text2);
    font-size: 14px;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--text3);
    border-top: 2px solid var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .features-grid, .pricing-grid { grid-template-columns: 1fr 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .features-grid, .pricing-grid, .grid-3 { grid-template-columns: 1fr; }
    .hero-title { font-size: 32px; }
    .nav-btn.ghost { display: none; }
    .page { padding: 1.25rem; }
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-area"></div>

<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const S = {
  route: 'landing',
  page: 'overview',
  user: null,
  authTab: 'login',
  authRole: 'creator',
  modal: null,
  modalData: null,
  products: [],
  orders: [],
  notifications: [],
  stats: {},
  kycPending: [],
  toggles: { t0:true,t1:true,t2:false,t3:true,t4:false }
};

// ══════════════════════════════════════════════
//  REAL-TIME DATA LOADING
// ══════════════════════════════════════════════
async function loadUserData() {
  if (!S.user) return;
  
  try {
    // Load user's products
    const productsRes = await API.products.getMine();
    if (productsRes.success) {
      S.products = productsRes.products || [];
    }
    
    // Load user's orders
    const ordersRes = await API.orders.getMine();
    if (ordersRes.success) {
      S.orders = ordersRes.orders || [];
    }
    
    // Load notifications
    const notifsRes = await API.notifications.getMine();
    if (notifsRes.success) {
      S.notifications = notifsRes.notifications || [];
    }
    
    // Load user stats
    const statsRes = await API.analytics.getMyStats();
    if (statsRes.success) {
      S.stats = { ...S.stats, ...statsRes.stats };
    }
    
    // Load KYC pending if admin
    if (S.user.role === 'admin') {
      const kycRes = await API.kyc.getPending();
      if (kycRes.success) {
        S.kycPending = kycRes.pendingKYC || [];
      }
      
      // Load platform stats for admin
      const platformStatsRes = await API.analytics.platform();
      if (platformStatsRes.success) {
        S.stats = { ...S.stats, ...platformStatsRes.stats };
      }
    }
    
  } catch (error) {
    console.error('Failed to load user data:', error);
  }
}

async function loadMarketplaceData() {
  try {
    const productsRes = await API.products.getPublic();
    if (productsRes.success) {
      S.products = productsRes.products || [];
    }
  } catch (error) {
    console.error('Failed to load marketplace data:', error);
  }
}

async function loadPlatformStats() {
  try {
    const statsRes = await API.analytics.getPlatformStats();
    if (statsRes.success) {
      S.stats = { ...S.stats, ...statsRes.stats };
    }
  } catch (error) {
    console.error('Failed to load platform stats:', error);
  }
}

// Product management functions
async function editProduct(productId) {
  const product = S.products.find(p => p._id === productId);
  if (product) {
    openModal('addProduct', product);
  }
}

async function previewProduct(productId) {
  const product = S.products.find(p => p._id === productId);
  if (product) {
    // Open product in new tab or modal
    window.open(`/products/${product.slug}`, '_blank');
  }
}

async function publishProduct(productId) {
  try {
    const res = await API.products.update(productId, { status: 'active' });
    if (res.success) {
      toast('Product published successfully! 🎉', 'success');
      await loadUserData(); // Refresh data
    } else {
      toast(res.message || 'Failed to publish product', 'error');
    }
  } catch (error) {
    toast('Failed to publish product', 'error');
  }
}

async function loadAnalyticsData(period) {
  try {
    const res = await API.analytics.creator({ period });
    if (res.success) {
      S.analytics = res.analytics;
      render(); // Re-render with new data
    }
  } catch (error) {
    toast('Failed to load analytics data', 'error');
  }
}

function getProductIcon(type) {
  const icons = {
    course: '📚',
    template: '📋',
    ebook: '📖',
    presets: '📷',
    file_bundle: '📦',
    coaching: '💬',
    subscription: '♻️'
  };
  return icons[type] || '📦';
}
// Marketplace functions
async function filterProducts(category) {
  try {
    const res = await API.products.getPublic(category !== 'all' ? { type: category } : {});
    if (res.success) {
      S.products = res.products || [];
      render(); // Re-render with filtered products
    }
  } catch (error) {
    toast('Failed to filter products', 'error');
  }
}

async function sortProducts(sortBy) {
  try {
    const res = await API.products.getPublic({ sort: sortBy });
    if (res.success) {
      S.products = res.products || [];
      render(); // Re-render with sorted products
    }
  } catch (error) {
    toast('Failed to sort products', 'error');
  }
}

// ══════════════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  if (S.route === 'landing') {
    app.innerHTML = renderLanding();
    loadPlatformStats(); // Load real platform stats
  } else if (S.route === 'auth') {
    app.innerHTML = renderAuth();
  } else {
    app.innerHTML = renderDashboard();
    if (S.user) {
      if (S.page === 'marketplace') {
        loadMarketplaceData(); // Load public products
      } else {
        loadUserData(); // Load user-specific data
      }
    }
  }
  if (S.modal) document.body.insertAdjacentHTML('beforeend', renderModal());
  bindAll();
}

// ══════════════════════════════════════════════
//  LANDING PAGE
// ══════════════════════════════════════════════
function renderLanding() {
  return `
  ${navLanding()}
  <section class="hero">
    <div class="hero-tag">✦ The Modern Creator Economy Platform</div>
    <h1 class="hero-title">Monetize your content.<br><span class="hl">Own your audience.</span></h1>
    <p class="hero-sub">CreateHub gives creators everything they need — sell digital products, build a stunning link-in-bio, and grow sustainable income. No code. No limits.</p>
    <div class="hero-cta">
      <button class="hero-btn primary" onclick="go('auth')">Start for free →</button>
      <button class="hero-btn secondary" onclick="go('auth')">Browse marketplace</button>
    </div>
  </section>
  <div class="stats-banner">
    ${[
      [S.stats.totalCreators || '1K+', 'Active creators'],

      [S.stats.totalCustomers || '100K+', 'End customers'],
      ['99.9%', 'Uptime SLA']

    </div>
    <div class="features-grid">
      ${[

        {icon:'🔗',t:'Link-in-Bio Pages',d:'Build a beautiful, branded landing page. Add all your links, products, and social profiles in one place.'},
        {icon:'📊',t:'Real-Time Analytics',d:'Track revenue, page views, conversion rates, subscriber growth, and traffic sources live.'},
        {icon:'🔐',t:'KYC Verification',d:'Identity-verified creators unlock full monetization, higher payout limits, and a verified badge.'},

  <div class="pricing-section" id="pricing">

      <p class="section-sub">No hidden fees, no surprise charges.</p>
    </div>
    <div class="pricing-grid">
      ${[
        { 
          name:'CreateHub Starter', 
          price:'$0', 
          per:'/month', 
          feats:['Basic link-in-bio page','Up to 5 products','Basic analytics','CreateHub branding'], 
          cta:'Start free', 
          style:'out', 
          feat:false,
          key:'starter'
        },
        { 
          name:'CreateHub Pro', 
          price:'$9', 
          per:'/month', 
          feats:['Unlimited products','Remove CreateHub branding','Custom page themes','Sales analytics'], 
          cta:'Get Pro', 
          style:'main', 
          feat:true, 
          badge:'MOST POPULAR',
          key:'pro'
        },
        { 
          name:'CreateHub Business', 
          price:'$19', 
          per:'/month', 
          feats:['Everything in Pro','Advanced analytics','Email capture tools','Custom domain support','Marketing integrations'], 
          cta:'Get Business', 
          style:'out', 
          feat:false,
          key:'business'
        },
        { 
          name:'CreateHub Premium', 
          price:'$39', 
          per:'/month', 
          feats:['Everything in Business','API access','Advanced customization','Premium themes','Priority support'], 
          cta:'Get Premium', 
          style:'out', 
          feat:false,
          key:'premium'
        },
      ].map(p=>`
        <div class="plan-card ${p.feat?'featured':''} ${S.user && S.user.subscription?.plan === p.key ? 'current' : ''}">
          ${p.badge?`<div class="plan-pop">${p.badge}</div>`:''}
          ${S.user && S.user.subscription?.plan === p.key ? `<div class="plan-pop" style="background:var(--green);top:-10px;">CURRENT PLAN</div>` : ''}
          <div class="plan-name">${p.name}</div>
          <div class="plan-price">${p.price}<span class="per">${p.per}</span></div>
          ${p.feats.map(f=>`<div class="plan-feat"><span class="ck">✓</span>${f}</div>`).join('')}
          <button class="plan-cta ${S.user && S.user.subscription?.plan === p.key ? 'current-plan-btn' : p.style}" onclick="${S.user && S.user.subscription?.plan === p.key ? 'toast(\"You are already on this plan!\",\"info\")' : 'go(\'auth\')'}">${S.user && S.user.subscription?.plan === p.key ? 'Current Plan' : p.cta}</button>
        </div>
      `).join('')}
    </div>
  </div>
  <footer class="landing-footer">© 2025 <span>CreateHub</span> · Built for creators worldwide</footer>`;
}

function navLanding() {
  return `<nav class="nav">
    <div class="nav-logo" onclick="go('landing')">Create<span>Hub</span></div>
    <div class="nav-links">
      <button class="nav-btn ghost" onclick="scrollTo('features')">Features</button>
      <button class="nav-btn ghost" onclick="scrollTo('pricing')">Pricing</button>
      <button class="nav-btn outline" onclick="go('auth')">Sign in</button>
      <button class="nav-btn primary" onclick="go('auth')">Get started free</button>
    </div>
  </nav>`;
}

// ══════════════════════════════════════════════

  return `<div class="s-item ${page===id?'active':''}" onclick="setPage('${id}')">

}

// ══════════════════════════════════════════════
function renderPage(p) {
  const u = S.user;
  const isAdmin = u && u.role === 'admin';
  switch(p) {
    case 'overview':      return isAdmin ? pageAdminOverview() : pageCreatorOverview();
    case 'products':      return pageProducts();
    case 'marketplace':   return pageMarketplace();
    case 'link-bio':      return pageLinkBio();
    case 'analytics':     return pageAnalytics();
    case 'plans':         return pagePlans();
    case 'kyc':           return pageKYC();
    case 'users':         return pageUsers();
    case 'kyc-review':    return pageKYCReview();
    case 'transactions':  return pageTransactions();
    case 'notifications': return pageNotifications();
    case 'settings':      return pageSettings();
    default:              return pagePlans(); // Default to plans page
  }
}

// Handle plan upgrade
function handlePlanUpgrade(planKey, price) {
  if (price === 0) {
    // Downgrade to starter
    if (confirm('Are you sure you want to downgrade to the Starter plan? You will lose access to premium features.')) {
      API.subscriptions.upgrade({ plan: planKey })
        .then(res => {
          if (res.success) {
            toast('Successfully downgraded to Starter plan', 'success');
            // Update user object
            if (S.user) {
              S.user.subscription = res.subscription;
            }
            render();
          } else {
            toast(res.message || 'Failed to downgrade plan', 'error');
          }
        })
        .catch(err => {
          console.error('Plan upgrade error:', err);
          toast('Failed to update plan', 'error');
        });
    }
  } else {
    // Upgrade to paid plan
    if (confirm(`Upgrade to ${planKey.charAt(0).toUpperCase() + planKey.slice(1)} plan for $${price}/month?`)) {
      API.subscriptions.upgrade({ plan: planKey })
        .then(res => {
          if (res.success) {
            toast(`Successfully upgraded to ${planKey.charAt(0).toUpperCase() + planKey.slice(1)} plan! 🎉`, 'success');
            // Update user object
            if (S.user) {
              S.user.subscription = res.subscription;
            }
            render();
          } else {
            toast(res.message || 'Failed to upgrade plan', 'error');
          }
        })
        .catch(err => {
          console.error('Plan upgrade error:', err);
          toast('Failed to update plan', 'error');
        });
    }
  }
}

function toggleFAQ(index) {
  const faqItems = document.querySelectorAll('.faq-item');
  const item = faqItems[index];
  if (item) {
    const answer = item.querySelector('.faq-answer');
    const icon = item.querySelector('.faq-icon');
    
    if (answer.style.display === 'block') {
      answer.style.display = 'none';
      icon.textContent = '+';
    } else {
      answer.style.display = 'block';
      icon.textContent = '−';
    }
  }
}

async function kycApprove(userId) {
  try {
    const res = await API.kyc.approve(userId);
    if (res.success) {
      toast('KYC approved successfully', 'success');
      await loadUserData(); // Refresh admin data
    } else {
      toast(res.message || 'Failed to approve KYC', 'error');
    }
  } catch (error) {
    toast('Failed to approve KYC', 'error');
  }
}

async function kycReject(userId) {
  const reason = prompt('Reason for rejection:');
  if (!reason) return;
  
  try {
    const res = await API.kyc.reject(userId, { reason });
    if (res.success) {
      toast('KYC rejected', 'info');
      await loadUserData(); // Refresh admin data
    } else {
      toast(res.message || 'Failed to reject KYC', 'error');
    }
  } catch (error) {
    toast('Failed to reject KYC', 'error');
  }
}

async function handleProductSubmit(event) {
  event.preventDefault();
  
  const form = document.getElementById('product-form');
  const formData = new FormData(form);
  const productData = {
    name: formData.get('name'),
    type: formData.get('type'),
    amount: parseFloat(formData.get('amount')),
    description: formData.get('description'),
    visibility: formData.get('visibility'),
    isFree: parseFloat(formData.get('amount')) === 0,
  };
  
  const isEdit = !!S.modalData?._id;
  const apiCall = isEdit ? API.products.update(S.modalData._id, productData) : API.products.create(productData);
  
  try {
    const res = await apiCall;
    if (res.success) {
      toast(isEdit ? 'Product updated successfully! 🎉' : 'Product created successfully! 🎉', 'success');
      closeModal();
      await loadUserData(); // Refresh product list
    } else {
      toast(res.message || 'Failed to save product', 'error');
    }
  } catch (error) {
    toast('Failed to save product', 'error');
  }
}

function exportReport() {
  // Generate CSV report of platform data
  const csvContent = [
    ['Metric', 'Value'],
    ['Total Users', S.stats.totalUsers || 0],
    ['Total Creators', S.stats.totalCreators || 0],
    ['Total Products', S.stats.totalProducts || 0],
    ['Total Revenue', '$' + (S.stats.totalRevenue || 0)],
    ['Pending KYC', S.kycPending.length || 0]
  ].map(row => row.join(',')).join('\n');
  
  const blob = new Blob([csvContent], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `createhub-report-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  window.URL.revokeObjectURL(url);
  
  toast('Report exported successfully', 'success');
}

//  PAYMENT FUNCTIONS
// ══════════════════════════════════════════════
let stripe = null;
let elements = null;
let cardElement = null;

function initializeStripe() {
  // Initialize Stripe with test key (replace with actual key)
  stripe = Stripe('pk_test_51234567890abcdef'); // Test key
  elements = stripe.elements();
  
  cardElement = elements.create('card', {
    style: {
      base: {
        fontSize: '14px',
        color: '#ededf8',
        '::placeholder': { color: '#8888aa' },
      },
    },
  });
  
  cardElement.mount('#card-element');
}

function handlePaymentSubmit(productId) {
  return async (event) => {
    event.preventDefault();
    
    if (!stripe || !cardElement) {
      toast('Payment system not initialized', 'error');
      return;
    }
    
    const submitBtn = document.getElementById('submit-payment');
    const errorDiv = document.getElementById('payment-error');
    const processingDiv = document.getElementById('payment-processing');
    
    submitBtn.disabled = true;
    errorDiv.style.display = 'none';
    processingDiv.style.display = 'flex';
    
    try {
      // Create order
      const orderRes = await API.orders.create({ productId });
      
      if (!orderRes.success || !orderRes.paymentIntent) {
        throw new Error(orderRes.message || 'Failed to create order');
      }
      
      // Confirm payment
      const { error, paymentIntent } = await stripe.confirmCardPayment(
        orderRes.paymentIntent.client_secret,
        {
          payment_method: {
            card: cardElement,
          },
        }
      );
      
      if (error) {
        throw new Error(error.message);
      }
      
      if (paymentIntent.status === 'succeeded') {
        toast('Payment successful! 🎉', 'success');
        closeModal();
        // Redirect to purchases or dashboard
        setTimeout(() => setPage('products'), 1500);
      }
      
    } catch (err) {
      console.error('Payment error:', err);
      errorDiv.textContent = err.message;
      errorDiv.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      processingDiv.style.display = 'none';
    }
  };
}

function initiatePayment(product) {
  openModal('payment', product);
  setTimeout(() => {
    if (!stripe) initializeStripe();
    
    const form = document.getElementById('payment-form');
    if (form) {
      form.removeEventListener('submit', handlePaymentSubmit);
      form.addEventListener('submit', handlePaymentSubmit(product._id));
    }
  }, 100);
}

// ══════════════════════════════════════════════
async function createLemonCheckout(type, data) {
  try {
    showLoading('Creating checkout...');
    
    let endpoint;
    switch(type) {
      case 'platform':
        endpoint = '/api/lemon-squeezy/platform/checkout';
        break;
      case 'creator':
        endpoint = `/api/lemon-squeezy/creator/${data.creatorId}/checkout`;
        break;
      default:
        throw new Error('Invalid checkout type');
    }
    
    const response = await fetch(endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${S.token}`
      },
      body: JSON.stringify(data)
    });
    
    const result = await response.json();
    
    if (result.success) {
      hideLoading();
      // Redirect to Lemon Squeezy checkout
      window.location.href = result.checkoutUrl;
    } else {
      hideLoading();
      toast(result.message || 'Failed to create checkout', 'error');
    }
    
  } catch (error) {
    hideLoading();
    toast('Checkout creation failed', 'error');
    console.error('Lemon Squeezy checkout error:', error);
  }
}

async function subscribeToPlan(planId) {
  await createLemonCheckout('platform', { planId });
}

async function subscribeToCreator(creatorId, offerId) {
  await createLemonCheckout('creator', { creatorId, offerId });
}

async function loadUserSubscriptions() {
  try {
    const response = await fetch('/api/lemon-squeezy/user/subscriptions', {
      headers: {
        'Authorization': `Bearer ${S.token}`
      }
    });
    
    const result = await response.json();
    
    if (result.success) {
      S.userSubscriptions = result;
      return result;
    } else {
      toast('Failed to load subscriptions', 'error');
      return null;
    }
    
  } catch (error) {
    toast('Failed to load subscriptions', 'error');
    console.error('Load subscriptions error:', error);
    return null;
  }
}

async function cancelSubscription(subscriptionId) {
  if (!confirm('Are you sure you want to cancel this subscription?')) return;
  
  try {
    showLoading('Cancelling subscription...');
    
    const response = await fetch(`/api/lemon-squeezy/subscription/${subscriptionId}`, {
      method: 'DELETE',
      headers: {
        'Authorization': `Bearer ${S.token}`
      }
    });
    
    const result = await response.json();
    
    hideLoading();
    
    if (result.success) {
      toast('Subscription cancelled successfully', 'success');
      await loadUserSubscriptions();
      render();
    } else {
      toast(result.message || 'Failed to cancel subscription', 'error');
    }
    
  } catch (error) {
    hideLoading();
    toast('Failed to cancel subscription', 'error');
    console.error('Cancel subscription error:', error);
  }
}

function toast(msg, type='info') {
  const area = document.getElementById('toast-area');
  if (!area) return;
  const icons = { success:'✓', error:'✕', info:'ℹ' };
  const colors = { success:'var(--green)', error:'var(--red)', info:'var(--accent3)' };
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span style="color:${colors[type]||colors.info};font-weight:700;font-size:13px">${icons[type]||'•'}</span><span>${msg}</span>`;
  area.appendChild(t);
  setTimeout(() => { t.style.animation = 'toastOut 0.2s ease forwards'; setTimeout(()=>t.remove(), 200); }, 3000);
}

  // Handle product form submission

  if (productForm) {
    productForm.addEventListener('submit', handleProductSubmit);

  // Handle payment form submission
  const paymentForm = document.getElementById('payment-form');
  if (paymentForm) {

function render() {
  const root = document.getElementById('app');
  if (!root) return;
  
  // Add loading overlay if needed
  const loadingOverlay = S.loading ? `
    <div class="loading-overlay">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <div class="loading-text">${S.loadingMessage}</div>
      </div>
    </div>
  ` : '';
  
  // Get current page content
  let content = '';
  switch(S.page) {
    case 'landing': content = pageLanding(); break;
    case 'auth': content = pageAuth(); break;
    case 'dashboard': content = pageDashboard(); break;
    case 'products': content = pageProducts(); break;
    case 'customers': content = pageCustomers(); break;
    case 'analytics': content = pageAnalytics(); break;
    case 'settings': content = pageSettings(); break;
    case 'plans': content = pagePlatformPlans(); break;
    case 'subscriptions': content = pageMySubscriptions(); break;
    case 'creator-subs': content = pageCreatorSubscriptions(S.creatorId); break;
    default: content = pageLanding();
  }
  
  root.innerHTML = content + loadingOverlay;
  
  // Initialize page-specific functionality
  if (S.page === 'auth') initializeStripe();
  if (S.page === 'dashboard' && S.user) loadUserSubscriptions();
  
  // Re-bind events
  bindAll();
}

    create: async (data) => {
      const res = await fetch('/api/products', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${S.token}`
        },
        body: JSON.stringify(data)
      });
      return await res.json();
    },
    update: async (id, data) => {
      const res = await fetch(`/api/products/${id}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${S.token}`
        },
        body: JSON.stringify(data)
      });
      return await res.json();
    }
  },
  orders: {
    getMine: async () => {
      const res = await fetch('/api/orders/mine', {
        headers: S.token ? { 'Authorization': `Bearer ${S.token}` } : {}
      });
      return await res.json();
    }
  },
  notifications: {
    getMine: async () => {
      const res = await fetch('/api/notifications/mine', {
        headers: S.token ? { 'Authorization': `Bearer ${S.token}` } : {}
      });
      return await res.json();
    }
  }
};
